paths:
  /editor:
    get:
      tags:
        - Projects
      summary: Search
      description: Search and browse projects
      operationId: EditorProjects
      parameters:
        - name: keywords
          in: query
          title: Project search keywords
          description: Keywords for searching project by title and IDNO
          schema:
            type: string
        - name: type
          in: query
          title: Project data type
          description: Project data type e.g. Microdata, Document, Table, ...
          schema:
            type: string
            enum:
              - microdata
              - document
              - table
              - timeseries
              - timeseries-db
              - geospatial
              - image
              - script
              - video
        - name: date_start
          in: query
          title: Start date
          description: Search for projects changed on or after this date. Use the date
            format `YYYY-MM-DD` e.g. 2020-01-01
          schema:
            type: string
            format: date
        - name: date_end
          in: query
          title: End date
          description: Search for projects changed on or before this date. Use the date
            format `YYYY-MM-DD` e.g. 2020-01-20
          schema:
            type: string
            format: date
        - name: offset
          in: query
          title: Offset
          description: Offset for pagination e.g. 10 to skip first 10 records
          schema:
            type: integer
        - name: limit
          in: query
          title: Page size
          description: Page size e.g. 10 to show 10 records
          schema:
            type: integer
        - name: sort_by
          in: query
          title: Sort results
          description: Sort results
          schema:
            type: string
            enum:
              - title_asc
              - title_desc
              - updated_asc
              - updated_desc
        - name: collection
          in: query
          title: Collections
          description: Filter by collections. Provide comma-separated collection IDs e.g.
            1,2,3
          schema:
            type: string
        - name: exclude_collections
          in: query
          title: Exclude collections
          description: When set to 'true', negates the collection filter to exclude the
            selected collections instead of including them
          schema:
            type: string
            enum:
              - "true"
              - "false"
        - name: ownership
          in: query
          title: Ownership filter
          description: Filter by project ownership
          schema:
            type: string
            enum:
              - self
              - shared
              - self,shared
        - name: users
          in: query
          title: Users filter
          description: Filter projects by users who created or modified them. Provide
            comma-separated user IDs e.g. 1,2,3
          schema:
            type: string
      responses:
        "200":
          description: successful operation
        "400":
          description: Bad input
  "/editor/{id}":
    get:
      tags:
        - Projects
      summary: Get project by ID
      description: Get study level metadata for a project
      operationId: singleProject
      parameters:
        - name: id
          in: path
          title: Project unique ID
          description: Project unique ID number
          required: true
          schema:
            type: string
        - name: version
          in: query
          title: Version number
          description: Get project by specific version number (e.g. 1.0.0)
          required: false
          schema:
            type: string
      responses:
        "200":
          description: successful operation
  "/editor/json{id}":
    get:
      tags:
        - Projects
      summary: Get project JSON
      description: >
        Get project metadata as JSON. For microdata/survey projects, the response
        includes all variables by default. Use `exclude_variables=1` to omit
        variables from the response (useful when only study-level metadata is
        needed, e.g. for comparison workflows).
      operationId: singleProjectJSON
      parameters:
        - name: id
          in: path
          description: Project ID or IDNO
          required: true
          schema:
            type: string
        - name: version
          in: query
          description: Get metadata for a specific version number (e.g. 1.0.0)
          required: false
          schema:
            type: string
        - name: exclude_variables
          in: query
          description: >
            Exclude variables from the response. Only applicable to microdata/survey
            projects. When set to `1`, the `variables` array is omitted from the
            JSON output. The `data_files` array is still included.
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: exclude_private_fields
          in: query
          description: >
            Exclude fields marked as private in the project template. Set to `1`
            to omit private fields from the response.
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: external_resources
          in: query
          description: >
            Include external resources (documentation files) in the response.
            Set to `1` to append the `external_resources` array to the JSON output.
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: admin_metadata
          in: query
          description: >
            Include administrative metadata in the response.
            Set to `1` to append the `admin_metadata` object to the JSON output.
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
      responses:
        "200":
          description: successful operation
        "400":
          description: Bad request - project not found or access denied
  "/editor/json-field/{id}":
    get:
      tags:
        - Projects
      summary: Get project JSON field by JSON Pointer
      description: >
        Returns a single value from the same project JSON document produced by
        Get project JSON (`/editor/json/{id}`), addressed by a JSON Pointer (RFC 6901).
        Examples: `/idno`, `/type`, `/identification/title`, `/variables/0/name` (when
        variables are included in the export).
      operationId: projectJsonField
      parameters:
        - name: id
          in: path
          description: Project ID or IDNO
          required: true
          schema:
            type: string
        - name: path
          in: query
          description: >
            JSON Pointer (RFC 6901) to the value, starting with `/`. Must be URL-encoded
            if it contains reserved characters (e.g. `~0`, `~1` for `~` and `/` in keys).
          required: true
          schema:
            type: string
        - name: version
          in: query
          description: Use metadata for a specific version number (e.g. 1.0.0)
          required: false
          schema:
            type: string
        - name: exclude_variables
          in: query
          description: Same as Get project JSON; when `1`, `/variables/...` is not available.
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: exclude_private_fields
          in: query
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: external_resources
          in: query
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: admin_metadata
          in: query
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
      responses:
        "200":
          description: Value resolved or path missing in document
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [success]
                  path:
                    type: string
                  found:
                    type: boolean
                  value:
                    description: Present when found is true; null when found is false
        "400":
          description: Bad request — missing path, invalid pointer syntax, project not found, or access denied
      security:
        - ApiKeyAuth: []
  "/editor/generate_pdf/{id}":
    get:
      tags:
        - Projects
      summary: Generate project PDF documentation
      description: Generate PDF documentation for a project. Returns status and result
        information.
      operationId: generateProjectPDF
      parameters:
        - name: id
          in: path
          title: Project unique ID
          description: Project ID or IDNO
          required: true
          schema:
            type: string
        - name: include_private_fields
          in: query
          title: Include private fields
          description: Include private fields in the PDF (0 = exclude, 1 = include).
            Default is 0.
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
        - name: template_uid
          in: query
          title: Template UID
          description: Template UID to use for PDF generation
          required: false
          schema:
            type: string
        - name: include_external_resources
          in: query
          title: Include external resources
          description: Include external resources in the PDF (0 = exclude, 1 = include).
            Default is 0.
          required: false
          schema:
            type: integer
            enum:
              - 0
              - 1
      responses:
        "200":
          description: PDF generation successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  result:
                    type: object
                    description: PDF generation result information
        "400":
          description: Bad request - project not found or generation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: failed
                  message:
                    type: string
      security:
        - ApiKeyAuth: []
  "/editor/delete/{id}":
    get:
      tags:
        - Projects
      summary: Delete project by ID
      description: Delete project
      operationId: deleteProject
      parameters:
        - name: id
          in: path
          title: Project unique ID
          description: Project unique ID number
          required: true
          schema:
            type: string
      responses:
        "200":
          description: successful operation
  "/editor/{id}/data_files":
    get:
      tags:
        - Microdata
      summary: List data files
      description: List all data files for a Microdata type project
      operationId: listDataFiles
      parameters:
        - name: id
          in: path
          title: Study unique ID
          description: Study unique ID number
          required: true
          schema:
            type: string
      responses:
        "200":
          description: successful operation
  "/editor/{id}/variables":
    get:
      tags:
        - Microdata
      summary: List variables
      description: >
        List variables for a microdata/survey project. Returns `name`, `labl`,
        `fid`, `vid`, `field_dtype`, and `sort_order` by default. Set
        `detailed=1` to include the full variable metadata blob. Supports
        pagination via `limit` and `offset`.
      operationId: listVariables
      parameters:
        - name: id
          in: path
          description: Project ID (numeric)
          required: true
          schema:
            type: integer
        - name: detailed
          in: query
          description: >
            Set to `1` to return the full variable metadata (all fields).
            Defaults to `0` (returns only plain-text DB columns: name, labl, fid,
            vid, field_dtype, sort_order).
          required: false
          schema:
            type: integer
            enum: [0, 1]
            default: 0
        - name: limit
          in: query
          description: >
            Maximum number of variables to return. Omit or set to `0` to return
            all variables (no pagination).
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          description: Number of variables to skip before returning results. Used for pagination.
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: successful operation
  "/editor/{id}/variables/{varId}":
    get:
      tags:
        - Microdata
      summary: Find variable
      description: Get a single variable metadata
      operationId: findSingleVariable
      parameters:
        - name: id
          in: path
          title: Study unique ID
          description: Study unique ID number
          required: true
          schema:
            type: string
        - name: varId
          in: path
          title: Variable ID
          description: Variable ID
          required: true
          schema:
            type: string
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
  "/editor/sdmx/{id}":
    post:
      tags:
        - SDMX
      summary: SDMX Metadata report set
      description: Create a new SDMX metadata report set
      operationId: getMetadatasetSDMX
      requestBody:
        content:
          application/json:
            schema:
              $ref: sdmx-json-metadata-schema.json
        required: true
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: sdmx-json-metadata-schema.json
      security:
        - ApiKeyAuth: []
  /importproject/:
    post:
      tags:
        - Projects
      summary: Import project
      description: Create a project by importing metadata (XML/JSON) or project zip package
      operationId: importProject
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                type:
                  description: "Project type e.g. microdata, document, table, timeseries, etc "
                  type: string
                file:
                  description: Project file (XML, JSON or package zip)
                  type: string
                  format: binary
              required:
                - type
                - file
        required: true
      responses:
        "200":
          description: successful operation
      security:
        - ApiKeyAuth: []
  /editor/create/survey:
    post:
      tags:
        - Microdata
      summary: Create Microdata
      description: Create a new microdata project
      operationId: createSurvey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: survey-schema.json
                - $ref: "#/components/schemas/CreateProjectOverwrite"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: survey-schema.json
      security:
        - ApiKeyAuth: []
  "/editor/update/survey/{id}":
    post:
      tags:
        - Microdata
      summary: Update Microdata
      description: Update Microdata project
      operationId: updateSurvey
      parameters:
        - in: path
          name: id
          description: Project ID or IDNO
          required: true
          schema:
            type: string
            format: string
      requestBody:
        $ref: "#/components/requestBodies/survey-schema.json"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: survey-schema.json
      security:
        - ApiKeyAuth: []
  "/editor/patch/{project-type}/{id}":
    post:
      tags:
        - Projects
        - Microdata
        - Timeseries
        - Timeseries-db
        - Geospatial
        - Document
        - Table
        - Image
        - Script
        - Video
      summary: Partial Metadata update
      description: Add, update, delete or replace parts of a project metadata
      operationId: patchProject
      parameters:
        - in: path
          name: id
          description: Project ID or IDNO
          required: true
          schema:
            type: string
            format: string
        - in: path
          name: project-type
          description: Project type
          required: true
          schema:
            type: string
            format: string
            enum:
              - survey
              - timeseries
              - timeseries-db
              - geospatial
              - document
              - table
              - image
              - script
              - video
      requestBody:
        content:
          application/json:
            schema:
              $ref: json-patch-schema.json
        required: true
      responses:
        "200":
          description: successful operation
      security:
        - ApiKeyAuth: []
  /editor/create/timeseries:
    post:
      tags:
