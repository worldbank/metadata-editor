  # ─────────────────────────────────────────────────────────────────────────
  # Codelists (global catalogue)
  # ─────────────────────────────────────────────────────────────────────────

  /codelists:
    get:
      tags:
        - Codelists
      summary: List codelists
      description: >-
        List global codelists. Default: one row per family (collapsed). Use `flat=1` for all
        version rows. Requires `codelist:browse` (registry view) permission.
      operationId: codelistsList
      parameters:
        - name: flat
          in: query
          schema:
            type: boolean
          description: When true, return one row per version instead of collapsed families.
        - name: collapsed
          in: query
          schema:
            type: boolean
          description: '`1` forces collapsed; `0` forces flat (overrides default).'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
          description: 1-based page number (max 200 per page).
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: search
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
          description: Alias for `search`.
        - name: agency
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/CodelistStatusCode'
        - name: exclude_archived
          in: query
          schema:
            type: boolean
        - name: with_counts
          in: query
          schema:
            type: boolean
            default: true
          description: Include `item_count` and `dsd_component_count` when true (default).
        - name: offset
          in: query
          schema:
            type: integer
          description: Legacy pagination offset (used when `page` is omitted).
        - name: limit
          in: query
          schema:
            type: integer
          description: Legacy page size (used when `page` is omitted).
      responses:
        '200':
          description: Codelist catalogue rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodelistListResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'
        '403':
          description: Registry access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'
    post:
      tags:
        - Codelists
      summary: Create codelist
      description: Create a new global codelist header. Requires `codelist:edit`.
      operationId: codelistsCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CodelistCreateRequest'
      responses:
        '200':
          description: Codelist created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodelistCreateResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/versions/{name}":
    get:
      tags:
        - Codelists
      summary: List versions for a codelist family
      operationId: codelistsVersions
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
          description: SDMX maintainable id (codelist name).
        - name: agency
          in: query
          schema:
            type: string
        - name: with_counts
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Version rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodelistVersionsResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/single/{id}":
    get:
      tags:
        - Codelists
      summary: Get codelist by id
      operationId: codelistsSingle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Codelist row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodelistSingleResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/lookup_by_identity":
    get:
      tags:
        - Codelists
      summary: Get codelist by SDMX identity (query params)
      description: >-
        Resolve by `agency`, `name`, and optional `version` query parameters (preferred when
        identity values contain special characters).
      operationId: codelistsLookupByIdentity
      parameters:
        - name: agency
          in: query
          required: true
          schema:
            type: string
        - name: name
          in: query
          required: true
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
          description: Optional; empty string matches blank version in the database.
      responses:
        '200':
          description: Codelist row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodelistSingleResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/by-identity/{agency}/{name}/{version}":
    get:
      tags:
        - Codelists
      summary: Get codelist by SDMX identity (path)
      operationId: codelistsByIdentity
      parameters:
        - name: agency
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: string
          description: May be empty for blank DB version.
      responses:
        '200':
          description: Codelist row
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodelistSingleResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/update/{id}":
    post:
      tags:
        - Codelists
      summary: Update codelist
      description: >-
        Update catalogue metadata (not agency/name/version identity). Requires `codelist:edit`.
      operationId: codelistsUpdate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodelistMutationResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/delete/{id}":
    post:
      tags:
        - Codelists
      summary: Delete codelist
      description: Requires `codelist:delete`. Locked or archived codelists cannot be deleted.
      operationId: codelistsDelete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodelistMutationResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/codes/{id}":
    get:
      tags:
        - Codelists
      summary: List codes in a codelist
      operationId: codelistsCodesList
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Codelist id
        - name: language
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Pass `0` to return all codes (no limit).
        - name: compact
          in: query
          schema:
            type: boolean
          description: When true, flatten labels to code/label/description per row.
      responses:
        '200':
          description: Code rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodelistCodesResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/import_json":
    post:
      tags:
        - Codelists
      summary: Import codelist JSON
      description: >-
        Import one codelist from NADA-compatible JSON (body or multipart `file`). Requires
        `codelist:import`. Supports `dry_run` and `replace`/`overwrite` on the JSON body or
        query string.
      operationId: codelistsImportJson
      parameters:
        - name: dry_run
          in: query
          schema:
            type: boolean
        - name: replace
          in: query
          schema:
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodelistImportResponse'
        '400':
          description: Validation or import failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/import_sdmx":
    post:
      tags:
        - Codelists
      summary: Import codelists from SDMX XML
      description: >-
        Import from raw XML body, multipart `file`, or JSON `{"url":"https://..."}`. Requires
        `codelist:import`.
      operationId: codelistsImportSdmx
      parameters:
        - name: dry_run
          in: query
          schema:
            type: boolean
        - name: replace
          in: query
          schema:
            type: boolean
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
          application/xml:
            schema:
              type: string
          text/xml:
            schema:
              type: string
      responses:
        '200':
          description: Import summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/export_json/{id}":
    get:
      tags:
        - Codelists
      summary: Export codelist JSON
      operationId: codelistsExportJson
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: download
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: JSON document or attachment
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/export_csv/{id}":
    get:
      tags:
        - Codelists
      summary: Export codelist items CSV
      description: >-
        All items as UTF-8 CSV with BOM (Excel-compatible). Columns:
        sort, parent_code, language, code, label, description.
      operationId: codelistsExportCsv
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: download
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: CSV attachment or JSON wrapper with csv field
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/import_csv/{id}":
    post:
      tags:
        - Codelists
      summary: Import codelist items from CSV
      description: >-
        Requires `codelist:edit`. Replaces all existing items when replace=1 (default).
        Multipart file field or raw CSV body. dry_run=1 validates without saving.
      operationId: codelistsImportCsv
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: dry_run
          in: query
          schema:
            type: boolean
            default: false
        - name: replace
          in: query
          schema:
            type: boolean
            default: true
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
          text/csv:
            schema:
              type: string
      responses:
        '200':
          description: Import result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  dry_run:
                    type: boolean
                  codes_imported:
                    type: integer
                  codes_count:
                    type: integer
                  rows_parsed:
                    type: integer
                  warnings:
                    type: array
                    items:
                      type: string
        '400':
          description: Validation or import failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/codelists/export_sdmx/{id}":
    get:
      tags:
        - Codelists
      summary: Export codelist SDMX XML
      operationId: codelistsExportSdmx
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: version
          in: query
          schema:
            type: string
            enum: ['2.1', '3.0']
            default: '2.1'
      responses:
        '200':
          description: SDMX-ML structure message (application/xml)
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  # ─────────────────────────────────────────────────────────────────────────
  # Data structures (global DSD catalogue)
  # ─────────────────────────────────────────────────────────────────────────

  /data_structures:
    get:
      tags:
        - Data Structures
      summary: List data structures
      description: List global DSDs. Supports collapsed or flat list and optional pagination.
      operationId: dataStructuresList
      parameters:
        - name: flat
          in: query
          schema:
            type: boolean
          description: When true, return one row per version.
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
          description: 1-based page number. When provided, returns paginated payload.
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: search
          in: query
          schema:
            type: string
          description: Search across title/name/agency/idno/version/description/notes.
        - name: q
          in: query
          schema:
            type: string
          description: Alias for `search`.
        - name: status
          in: query
          description: Exact status filter (`DataStructureStatusCode`).
          schema:
            $ref: '#/components/schemas/DataStructureStatusCode'
      responses:
        '200':
          description: Successful operation
        '400':
          description: Bad request

  /data_structures/single/{id}:
    get:
      tags:
        - Data Structures
      summary: Get data structure by id
      operationId: dataStructuresSingle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: with_components
          in: query
          schema:
            type: boolean
          description: When true, include components array.
      responses:
        '200':
          description: Successful operation
        '400':
          description: Bad request

  /data_structures/lookup/{segment}:
    get:
      tags:
        - Data Structures
      summary: Get data structure by id or idno
      operationId: dataStructuresLookup
      parameters:
        - name: segment
          in: path
          required: true
          schema:
            type: string
        - name: with_components
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Successful operation
        '400':
          description: Bad request

  /data_structures/by_identity:
    get:
      tags:
        - Data Structures
      summary: Get data structure by SDMX identity
      operationId: dataStructuresByIdentity
      parameters:
        - name: agency
          in: query
          required: true
          schema:
            type: string
        - name: name
          in: query
          required: true
          schema:
            type: string
        - name: version
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
        '400':
          description: Bad request

  /data_structures/validate/{id}:
    get:
      tags:
        - Data Structures
      summary: Validate persisted data structure
      operationId: dataStructuresValidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Validation report
        '400':
          description: Bad request

  /data_structures/export/{segment}:
    get:
      tags:
        - Data Structures
      summary: Export data structure JSON
      description: >-
        Returns canonical interchange JSON. Export shape places `components` as a
        sibling of `data_structure` (header only). Import via `import_json` expects
        `components` nested inside `data_structure` — see `data-structure-schema.json`.
      operationId: dataStructuresExport
      parameters:
        - name: segment
          in: path
          required: true
          schema:
            type: string
          description: Numeric id or catalogue idno.
        - name: download
          in: query
          schema:
            type: boolean
            default: true
          description: When true (default), respond as attachment download.
      responses:
        '200':
          description: Export payload or file download
        '400':
          description: Bad request

  /data_structures/versions/{segment}:
    get:
      tags:
        - Data Structures
      summary: List versions for a data structure family
      operationId: dataStructuresVersions
      parameters:
        - name: segment
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
        '400':
          description: Bad request

  /data_structures/projects/{segment}:
    get:
      tags:
        - Data Structures
      summary: List projects linked to a data structure
      operationId: dataStructuresProjects
      parameters:
        - name: segment
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Successful operation
        '400':
          description: Bad request

