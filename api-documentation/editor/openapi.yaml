      xml:
        name: DeleteProjectVersionById
    PublishOptions:
      type: object
      description: >
        Fields merged into the exported project JSON before POST to NADA. Names and values
        follow the Metadata Editor publish UI and NADA dataset-create expectations. Any
        additional JSON properties are also merged if supplied.
      properties:
        overwrite:
          type: string
          enum:
            - "yes"
            - "no"
          default: "no"
          description: >
            If `yes`, allows replacing an existing study in the catalog with the same IDNO.
            Merged as top-level `overwrite` on the dataset JSON sent to NADA.
        published:
          type: integer
          format: int32
          enum:
            - 0
            - 1
          description: Catalog visibility — `0` draft, `1` published (merged as `published`).
        access_policy:
          type: string
          description: >
            Data access / access policy code merged as `access_policy` on the payload.
            Allowed values match the Metadata Editor publish form; NADA may validate against
            codes returned by `GET .../index.php/api/catalog/data_access_codes` on the catalog.
          enum:
            - data_na
            - direct
            - public
            - licensed
            - remote
            - enclave
            - open
            - ""
          default: data_na
        data_remote_url:
          type: string
          description: >
            URL for remote / external data access; merged as `data_remote_url`. Used when
            `access_policy` is `remote` or `enclave` (per catalog configuration).
        repositoryid:
          type: string
          description: >
            Target collection (repository) code in NADA; merged as `repositoryid`. Options
            are typically populated from `GET .../index.php/api/collections` on the catalog
            (see `/publish/catalog_info/...`).
      additionalProperties: true
      example:
        overwrite: "yes"
        published: 1
        access_policy: licensed
        data_remote_url: ""
        repositoryid: MY_COLLECTION
      xml:
        name: PublishOptions
    NadaCatalogInfoResponse:
      type: object
      description: Response from prefetching NADA data for the publish form
      properties:
        study_info:
          type: object
          description: >
            Outcome of `GET {catalog}/index.php/api/datasets/{study_idno}`. On success,
            normalized fields from `dataset` (without embedded `metadata`) plus `status:
            success`. On failure, includes `status` (`error` or `failed`), `error` message,
            optional `response`, and `api_url`.
        collections_codes:
          type: array
          description: Entries from NADA `GET .../index.php/api/collections` (`collections` array)
          items:
            type: object
            additionalProperties: true
        data_access_codes:
          type: array
          description: >
            Codes from NADA `GET .../index.php/api/catalog/data_access_codes` (`codes` array);
            used to populate the data access / access_policy control.
          items:
            type: object
            additionalProperties: true
        collections_linked:
          type: array
          description: >
            Collections already associated with the study from NADA
            `GET .../index.php/api/datasets/collections/{study_idno}` (normalized list).
          items:
            type: object
            additionalProperties: true
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        type:
          type: string
        message:
          type: string
