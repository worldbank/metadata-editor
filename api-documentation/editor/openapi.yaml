  "/publish/external_resource/{sid}/{catalog_connection_id}":
    post:
      tags:
        - Publish projects
      summary: Publish single external resource
      description: >
        Publish a single external resource (documentation file) to a NADA catalog.
        `catalog_id` in the body must match the catalog connection used for publishing.
        The optional trailing path segment matches the client URL pattern; the catalog is
        taken from the JSON body (`catalog_id`).
      operationId: publishSingleExternalResource
      parameters:
        - in: path
          name: sid
          description: Project ID or IDNO
          required: true
          schema:
            type: string
        - in: path
          name: catalog_connection_id
          description: Catalog connection ID (same as `catalog_id` in body; echoed in URL by clients)
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - resource_id
                - catalog_id
              properties:
                resource_id:
                  type: integer
                  description: Resource ID to publish
                catalog_id:
                  type: integer
                  description: Catalog connection ID (must match path `catalog_connection_id` when both are used)
                sid:
                  type: string
                  description: Project ID (optional; echoed by some clients; path `sid` is authoritative)
                overwrite:
                  type: string
                  enum:
                    - yes
                    - no
                  default: no
                  description: >
                    Sent to NADA on the resource payload as `overwrite`. When `yes`, replaces an
                    existing resource with the same identity in the catalog.
        required: true
      responses:
        "200":
          description: Resource published successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  resource:
                    type: object
                    description: Resource metadata response
                  resource_upload:
                    type: object
                    description: Resource file upload response (if file was uploaded)
        "400":
          description: Bad request - missing parameters or publishing failed
      security:
        - ApiKeyAuth: []
  "/publish/external_resources/{sid}/{connection_id}":
    post:
      tags:
        - Publish projects
      summary: Publish all external resources
      description: >
        Publishes every external resource for the project to NADA. For each resource, metadata is
        POSTed to `{catalog}/index.php/api/resources/{study_idno}` with `overwrite` set to `yes`.
        If the resource has a stored file (`filename` is set and not an external URL), the file is
        then uploaded to `{catalog}/index.php/api/datasets/{study_idno}/files`, matching the
        single-resource publish behavior. Request body JSON (if any) is accepted but not applied.
      operationId: publishAllExternalResources
      parameters:
        - in: path
          name: sid
          description: Project ID or IDNO
          required: true
          schema:
            type: string
        - in: path
          name: connection_id
          description: Catalog connection ID
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Optional; unused by the server today
      responses:
        "200":
          description: Resources published successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    resource:
                      type: object
                      description: NADA response for the resource metadata POST
                    resource_upload:
                      type: object
                      description: NADA response for the file upload (only when a local file was attached)
        "400":
          description: Bad request - project not found or publishing failed
      security:
        - ApiKeyAuth: []
