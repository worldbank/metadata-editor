        - Microdata
      summary: Upload microdata data file
      description: Upload a microdata data file (CSV, DTA, SAV, etc.). The file will
        be processed and metadata extracted automatically.
      operationId: uploadDatafile
      parameters:
        - in: path
          name: id
          description: Project ID or IDNO
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  description: Data file to upload (CSV, Stata DTA, SPSS SAV, etc.)
                  type: string
                  format: binary
                overwrite:
                  description: "Overwrite existing data file if it exists. Valid values: `0` (do
                    not overwrite), `1` (overwrite)"
                  type: integer
                  enum:
                    - 0
                    - 1
                  default: 0
                store_data:
                  description: Whether to store the data file or just metadata. Use 'store' to
                    keep data accessible, 'remove' to delete data after metadata
                    extraction.
                  type: string
                  enum:
                    - store
                    - remove
                description:
                  type: string
                  description: File description (datafile-schema.json)
                producer:
                  type: string
                  maxLength: 255
                  description: File producer
                data_checks:
                  type: string
                  description: Processing / data checks
                missing_data:
                  type: string
                  description: Missing data documentation
                version:
                  type: string
                  maxLength: 255
                  description: File version
                notes:
                  type: string
                  description: File notes
              required:
                - file
                - store_data
        required: true
      responses:
        "200":
          description: Data file uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  result:
                    type: object
                    properties:
                      uploaded:
                        type: object
                        properties:
                          uploaded_file_name:
                            type: string
                          base64:
                            type: string
                      file_id:
                        type: string
        "400":
          description: Bad request - project not found, file upload failed, or invalid
            parameters
      security:
        - ApiKeyAuth: []
