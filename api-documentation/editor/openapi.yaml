    post:
      tags:
        - Data Structures
      summary: Create data structure
      description: >-
        Create a global DSD header row (components added separately or via import_json).
        Request body matches `data-structure-schema.json`.
      operationId: dataStructuresCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'data-structure-schema.json'
      responses:
        '200':
          description: Data structure created
        '400':
          description: Bad request

  /data_structures/update/{id}:
    post:
      tags:
        - Data Structures
      summary: Update data structure
      operationId: dataStructuresUpdate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Data structure updated
        '400':
          description: Bad request

  /data_structures/import_json:
    post:
      tags:
        - Data Structures
      summary: Import data structure JSON
      description: >-
        Import global DSD, components and codelists from JSON. Body matches
        `data-structure-schema.json`: root `data_structure` (identity + `components`),
        optional boolean `overwrite` and `dry_run` on the same JSON object (no query
        flags).
      operationId: dataStructuresImportJson
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'data-structure-schema.json'
      responses:
        '200':
          description: Validation/dry-run succeeded or import completed
        '400':
          description: Validation failed or bad request

  /data_structures/import_sdmx:
    post:
      tags:
        - Data Structures
      summary: Import data structure from SDMX XML
      description: Import SDMX-ML structure XML from multipart `file` or XML body.
      operationId: dataStructuresImportSdmx
      parameters:
        - name: overwrite_codelists
          in: query
          schema:
            type: boolean
        - name: dsd_id
          in: query
          schema:
            type: string
          description: Optional DataStructure @id selector when multiple are present in XML.
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                overwrite_codelists:
                  type: string
                dsd_id:
                  type: string
          application/xml:
            schema:
              type: string
          text/xml:
            schema:
              type: string
      responses:
        '201':
          description: Import completed
        '400':
          description: Bad request

  /data_structures/components/{structure_id}:
    post:
      tags:
        - Data Structures
      summary: Create data structure component
      operationId: dataStructuresComponentCreate
      parameters:
        - name: structure_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Component created
        '400':
          description: Bad request

  /data_structures/component_update/{id}:
    post:
      tags:
        - Data Structures
      summary: Update data structure component
      operationId: dataStructuresComponentUpdate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Component updated
        '400':
          description: Bad request

  /data_structures/component_delete/{id}:
    post:
      tags:
        - Data Structures
      summary: Delete data structure component
      operationId: dataStructuresComponentDelete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Component deleted
        '400':
          description: Bad request

  /data_structures/duplicate/{id}:
    post:
      tags:
        - Data Structures
      summary: Duplicate data structure
      operationId: dataStructuresDuplicate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                agency:
                  type: string
                version:
                  type: string
      responses:
        '200':
          description: Duplicate created
        '400':
          description: Bad request

  /data_structures/delete/{id}:
    post:
      tags:
        - Data Structures
      summary: Delete data structure
      operationId: dataStructuresDelete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
        '400':
          description: Bad request

  /data_structures/batch_delete:
    post:
      tags:
        - Data Structures
      summary: Batch delete data structures
      operationId: dataStructuresBatchDelete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Batch delete result
        '400':
          description: Bad request

  # ─────────────────────────────────────────────────────────────────────────
  # Indicator DSD (project binding and data)
  # ─────────────────────────────────────────────────────────────────────────

  "/indicator_dsd/{sid}":
    get:
      tags:
        - Indicator DSD
      summary: List DSD columns for a project
      description: >-
        Returns resolved DSD columns for the project. When bound to a global catalogue
        DSD, columns are read from the registry (read-only). Use `resolve_codelists=1`
        to expand linked global codelists into each column.
      operationId: indicatorDsdList
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
          description: Project id or idno
        - name: detailed
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: resolve_codelists
          in: query
          schema:
            type: integer
            enum: [0, 1]
        - name: offset
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Column list
        '400':
          description: Bad request

  "/indicator_dsd/single/{sid}/{id}":
    get:
      tags:
        - Indicator DSD
      summary: Get single DSD column
      operationId: indicatorDsdSingle
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Column detail
        '400':
          description: Bad request

  "/indicator_dsd/validate/{sid}":
    get:
      tags:
        - Indicator DSD
      summary: Validate project DSD structure and data
      description: >-
        Validates bound global DSD structure first. Data checks (column presence, codelist
        allow-lists, observation-key uniqueness) run only when structure is valid and
        published timeseries data exists in DuckDB. Always returns HTTP 200 with a report
        when the project exists (use `valid` and nested blocks, not only HTTP status).
      operationId: indicatorDsdValidate
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
          description: Project numeric id or idno
      responses:
        '200':
          description: Validation report (HTTP 200 even when validation fails)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndicatorDsdValidateResponse'
        '400':
          description: Bad request (e.g. project not found)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/indicator_dsd/binding/{sid}":
    get:
      tags:
        - Indicator DSD
      summary: Get project DSD binding context
      description: >-
        Binding state, metadata `data_structure_reference`, global structure header,
        import readiness (`import_ready`, `import_blocked_reasons`), and structure validation
        summary. Use before data upload to confirm `indicator_id_value` and `implied_freq_code`
        are set.
      operationId: indicatorDsdBinding
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
          description: Project numeric id or idno
      responses:
        '200':
          description: Binding context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndicatorDsdBindingResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiStatusFailed'

  "/indicator_dsd/bind_global/{sid}":
    post:
      tags:
        - Indicator DSD
      summary: Bind global catalogue DSD to project
      description: >-
        Attach a registry DSD. Supply `data_structure_id` or
        `data_structure_reference` (see `DataStructureReference`). Optionally set
        `indicator_id_value` for data import.
      operationId: indicatorDsdBindGlobal
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IndicatorDsdBindRequest'
      responses:
        '200':
          description: Bound
        '400':
          description: Bad request

  "/indicator_dsd/update_binding/{sid}":
    post:
      tags:
        - Indicator DSD
      summary: Update project DSD binding fields
      operationId: indicatorDsdUpdateBinding
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                indicator_id_value:
                  type: string
                implied_freq_code:
                  type: string
                  description: SDMX FREQ code when structure has no periodicity column
      responses:
        '200':
          description: Updated
        '400':
          description: Bad request

  "/indicator_dsd/unbind/{sid}":
    post:
      tags:
        - Indicator DSD
      summary: Detach global DSD from project
      description: Removes binding, clears metadata reference, and drops published timeseries data.
      operationId: indicatorDsdUnbind
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Unbound
        '400':
          description: Bad request

  "/indicator_dsd/reset/{sid}":
    post:
      tags:
        - Indicator DSD
      summary: Reset published indicator data
      description: Drops the DuckDB timeseries table for the project.
      operationId: indicatorDsdReset
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reset result
        '400':
          description: Bad request

  "/indicator_dsd/data_upload_prepare/{sid}":
    post:
      tags:
        - Indicator DSD
      summary: Prepare indicator data upload
      description: >-
        Upload a CSV (or reference a completed resumable `upload_id`), validate required DSD
        column headers, stage the file on the project, and return distinct values in the
        indicator_id column. Does not require `indicator_id_value` or `implied_freq_code`
        (those are enforced on `data_upload_import`). Provide **either** `file` **or**
        `upload_id`, not both.
      operationId: indicatorDsdDataUploadPrepare
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
          description: Project numeric id or idno
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV file to stage (mutually exclusive with upload_id)
                upload_id:
                  type: string
                  description: >-
                    Completed resumable upload session id from `POST /upload/{sid}` (mutually
                    exclusive with file)
                delimiter:
                  type: string
                  maxLength: 1
                  default: ","
                  description: CSV field delimiter (single character)
                keep_extra_csv_columns:
                  type: string
                  description: >-
                    When `true`/`1`/`yes`, extra CSV columns beyond the DSD are kept on import
              description: Supply `file` or `upload_id` (not both).
      responses:
        '200':
          description: Headers valid; CSV staged for import
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndicatorDsdDataUploadPrepareResponse'
        '400':
          description: Header validation failed or request error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/IndicatorDsdDataUploadPrepareHeaderError'
                  - $ref: '#/components/schemas/ApiStatusFailed'

  "/indicator_dsd/data_upload_import/{sid}":
    post:
      tags:
        - Indicator DSD
      summary: Import prepared indicator data
      operationId: indicatorDsdDataUploadImport
      parameters:
        - name: sid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Import result
        '400':
          description: Bad request

  # ─────────────────────────────────────────────────────────────────────────
  # Jobs
  # ─────────────────────────────────────────────────────────────────────────

  "/jobs/import_indicator_data":
    post:
      tags:
        - Jobs
      summary: Import indicator data (full workflow)
      description: >
        Submit a single background job that handles the complete indicator data
        import workflow: copies the uploaded CSV, validates headers against the
        bound DSD, and publishes rows for the requested `indicator_value` via
        replace-from-csv.


        The CSV must be uploaded first via the resumable upload API
        `POST /upload/{sid}` (initialize session, send chunks, complete) to obtain an
        `upload_id`. Poll job status via `GET /jobs/{uuid}`.


        For interactive import in the editor, use
        `POST /api/indicator_dsd/data_upload_prepare/{sid}` and
        `POST /api/indicator_dsd/data_upload_import/{sid}` instead.


        Requires edit access to the target project (same as the indicator DSD import APIs).
      operationId: importIndicatorDataJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - project_id
                - upload_id
                - indicator_value
              properties:
                project_id:
                  oneOf:
                    - type: integer
                      description: Numeric database project id
                    - type: string
                      description: Project idno, or numeric id as a string (same resolution as other editor APIs)
                  description: Indicator/timeseries project — numeric id or idno
                upload_id:
                  type: string
                  description: Completed upload session ID from `POST /upload/{sid}`
                indicator_value:
                  type: string
                  description: Value in the DSD indicator_id column; only matching rows are imported
                delimiter:
                  type: string
                  default: ","
                  description: CSV field delimiter character
                priority:
                  type: integer
                  default: 0
                  description: Job queue priority
      responses:
        "201":
          description: Import job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  uuid:
                    type: string
                    description: Job UUID — use with GET /jobs/{uuid} to poll status
                  job:
                    type: object
                    additionalProperties: true
      security:
        - ApiKeyAuth: []

components:
  requestBodies:
    timeseries-db-schema.json:
      content:
        application/json:
          schema:
            $ref: timeseries-db-schema.json
      required: true
    survey-schema.json:
      content:
        application/json:
          schema:
            $ref: survey-schema.json
      required: true
    video-schema.json:
      content:
        application/json:
          schema:
            $ref: video-schema.json
      required: true
    table-schema.json:
      content:
        application/json:
          schema:
            $ref: table-schema.json
      required: true
    AddProjectsToCollection:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AddProjectsToCollection"
      required: true
    timeseries-schema.json:
      content:
        application/json:
          schema:
            $ref: timeseries-schema.json
      required: true
    geospatial-schema.json:
      content:
        application/json:
          schema:
            $ref: geospatial-schema.json
      required: true
    document-schema.json:
      content:
        application/json:
          schema:
            $ref: document-schema.json
      required: true
    image-schema.json:
      content:
        application/json:
          schema:
            $ref: image-schema.json
      required: true
    script-schema.json:
      content:
        application/json:
          schema:
            $ref: script-schema.json
      required: true
    Collection:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Collection"
      required: true
    UserCollectionAccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UserCollectionAccess"
      required: true
    RemoveUserCollectionAccess:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RemoveUserCollectionAccess"
      required: true
    ProjectTemplate:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProjectTemplate"
      required: true
    CatalogConnection:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CatalogConnection"
      required: true
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication
  schemas:
    CreateProjectOverwrite:
      type: object
      properties:
        overwrite:
          type: boolean
          default: false
          description: >
            If true and a project with the same idno already exists, overwrite its metadata
            in place instead of returning an error. The existing project must be the same type.
            Collection memberships and file attachments are preserved.
    Template:
      type: object
      properties:
        type:
          type: string
        template:
          type: object
      xml:
        name: template
    TemplateForCollection:
      type: object
      properties:
        collection_id:
          type: integer
        template_uid:
          type: string
        project_type:
          type: string
          description: survey, timeseries, table, document, geospatial, ...
      xml:
        name: TemplateForCollection
    Collection:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
      xml:
        name: collection
    CollectionList:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        created:
          type: string
          format: date-time
        changed:
          type: string
          format: date-time
        created_by:
          type: integer
          format: int64
        changed_by:
          type: integer
          format: int64
        username:
          type: string
      xml:
        name: CollectionList
    AddProjectsToCollection:
      type: object
      properties:
        collections:
          type: array
          items:
            type: integer
        id_format:
          type: string
          default: id
          enum:
            - id
            - idno
        projects:
          type: array
          items:
            type: string
      xml:
        name: AddProjectsToCollection
    UserCollectionAccess:
      type: object
      properties:
        collection_id:
          type: integer
        user_id:
          type: integer
          format: int64
        permissions:
          type: string
          description: Single collection ACL role per grant (stored as one value in `editor_collection_acl.permissions`).
          enum:
            - view
            - edit
            - admin
          example: admin
    UserCollectionPermissions:
      type: object
      properties:
        status:
          type: string
          description: Response status
          example: success
        user_id:
          type: integer
          format: int64
          description: User ID requesting permissions
          example: 123
        is_admin:
          type: boolean
          description: Whether user has admin privileges
          example: false
        admin_type:
          type: string
          description: Type of admin access (global, collection, none)
          enum:
            - global
            - collection
            - none
          example: collection
        collections:
          type: object
          description: Collection permissions keyed by collection ID
          additionalProperties:
            $ref: "#/components/schemas/CollectionPermission"
      xml:
        name: UserCollectionPermissions
    CollectionPermission:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Collection ID
          example: 1
        title:
          type: string
          description: Collection title
          example: Research Data 2024
        description:
          type: string
          description: Collection description
          example: Annual research data collection
        pid:
          type: integer
          format: int64
          description: Parent collection ID
          example: 0
        created_by:
          type: integer
          format: int64
          description: User ID who created the collection
          example: 123
        created:
          type: string
          format: date-time
          description: Collection creation timestamp
          example: 2024-01-15T10:00:00Z
        changed:
          type: string
          format: date-time
          description: Collection last modified timestamp
          example: 2024-03-20T14:30:00Z
        owner_username:
          type: string
          description: Username of collection owner
          example: john_doe
        permission_level:
          type: string
          description: User's permission level for this collection
          enum:
            - view
            - edit
            - admin
          example: edit
        can_edit:
          type: boolean
          description: Whether user can edit this collection
          example: true
        can_admin:
          type: boolean
          description: Whether user can administer this collection
          example: false
        can_delete:
          type: boolean
          description: Whether user can delete this collection
          example: false
        can_manage_access:
          type: boolean
          description: Whether user can manage access to this collection
          example: false
        can_add_projects:
          type: boolean
          description: Whether user can add projects to this collection
          example: true
        can_remove_projects:
          type: boolean
          description: Whether user can remove projects from this collection
          example: true
      xml:
        name: CollectionPermission
    RemoveUserCollectionAccess:
      type: object
      properties:
        collection_id:
          type: integer
        user_id:
          type: integer
          format: int64
    CopyCollection:
      type: object
      properties:
        source_id:
          type: integer
          description: Source collection ID
        target_id:
          type: integer
          description: Target collection ID
    MoveCollection:
      type: object
      properties:
        source_id:
          type: integer
          description: Source collection ID
        target_id:
          type: integer
          description: Target collection ID
    AuthenticationResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        user_id:
          type: integer
        username:
          type: string
        api-keys:
          type: object
      xml:
        name: AuthenticationResponse
    Resource:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        pid:
          type: integer
          format: int64
          description: Project ID
        resource_type:
          type: string
          enum:
            - microdata
            - questionnaire
            - report
            - table
            - other
        title:
          type: string
        description:
          type: string
        filename:
          type: string
        created:
          type: string
          format: date-time
        changed:
          type: string
          format: date-time
      xml:
        name: Resource
    CreateAdminMetadataType:
      type: object
      required:
        - name
        - title
        - schema_id
        - schema_urn
      properties:
        name:
          type: string
          title: Unique name for the metadata type
          description: Unique name for the metadata type with no spaces or special
            characters
        title:
          type: string
          title: Title of the metadata type
        description:
          type: string
          title: Description of the metadata type
        schema_id:
          type: string
          title: Schema ID
        schema_urn:
          type: string
          title: Schema URN (only when schema_id is not provided)
    UpdateAdminMetadataType:
      type: object
      required:
        - name
        - title
        - schema_id
        - schema_urn
      properties:
        name:
          type: string
          title: Unique name for the metadata type
          description: Unique name for the metadata type with no spaces or special
            characters
        title:
          type: string
          title: Title of the metadata type
        description:
          type: string
          title: Description of the metadata type
        schema_id:
          type: string
          title: Schema ID
        schema_urn:
          type: string
          title: Schema URN (only when schema_id is not provided)
    createAdminMetadataSchema:
      type: object
      required:
        - name
        - agency
        - version
        - title
        - schema
      properties:
        name:
          type: string
          title: Unique name for the metadata schema
          description: Unique name for the metadata schema with no spaces or special
            characters
        agency:
          type: string
          title: Agency
          description: Agency/Organization responsible for the schema. Use acronym e.g.
            IHSN, WBG, etc.
        version:
          type: string
          title: Version
          description: Version of the schema. Use symantic versioning e.g. 1.0.0
        title:
          type: string
          title: Title of the metadata schema
        description:
          type: string
          title: Description of the metadata schema
        schema:
          type: object
          title: Schema
          description: JSON schema for the metadata type
    CreateAdminMetadataData:
      type: object
      required:
        - project_id
        - template_uid
        - metadata
      properties:
        project_id:
          type: string
          title: Project ID/IDNO
          description: Project ID or IDNO
        template_uid:
          type: string
          title: Metadata template UID
          description: Admin metadata template UID
        metadata:
          type: object
          title: Metadata
          description: Administrative metadata
    PatchAdminMetadataData:
      type: object
      required:
        - project_id
        - template_uid
        - patches
      properties:
        project_id:
          type: string
          title: Project ID/IDNO
          description: Project ID or IDNO
        template_uid:
          type: string
          title: Metadata template UID
          description: Admin metadata template UID
        patches:
          type: array
          title: JSON Patch operations
          description: Array of JSON patch operations (RFC 6902)
          items:
            type: object
            required:
              - op
              - path
            properties:
              op:
                type: string
                enum:
                  - add
                  - remove
                  - replace
                  - move
                  - copy
                  - test
                description: Operation type
              path:
                type: string
                description: "JSON Pointer path (RFC 6901) to the element to be patched.
                  Example: /metadata_container/metadata_section/options/0/value"
              value:
                description: Value for add or replace operations (can be string, number,
                  boolean, object, or array)
              from:
                type: string
                description: Source path for move or copy operations
    QueryAdminMetadataData:
      type: object
      properties:
        project_id:
          type: string
          title: Project ID/IDNO
          description: (Optional) Filter by project ID or IDNO
        template_uid:
          type: string
          title: Metadata template UID
          description: (Optional) Filter by metadata template UID. For multiple templates,
            use comma separated values
        offset:
          type: integer
          title: Offset
          description: Offset for pagination
        limit:
          type: integer
          title: Limit
          description: Limit for pagination
    RemoveAdminMetadataData:
      type: object
      required:
        - project_id
        - template_uid
      properties:
        project_id:
          type: string
          title: Project ID/IDNO
          description: Project ID or IDNO
        template_uid:
          type: string
          title: Template UID
          description: Admin metadata template UID
    ProjectTemplate:
      type: object
      properties:
        template_uid:
          type: string
          description: Template UID
      xml:
        name: ProjectTemplate
    ProjectOptionsIDNO:
      type: object
      properties:
        idno:
          type: string
          description: New IDNO for the project
      xml:
        name: ProjectOptionsIDNO
    CatalogConnection:
      type: object
      properties:
        title:
          type: string
          description: Catalog connection title
        url:
          type: string
          description: URL of the catalog e.g. https://your-nada-catalog.org
        api_key:
          type: string
          description: API key for your NADA catalog
      xml:
        name: CatalogConnection
    CatalogConnectionDelete:
      type: object
      properties:
        catalog_id:
          type: integer
          description: Catalog connection ID
      xml:
        name: CatalogConnectionDelete
    CreateProjectVersion:
      type: object
      required:
        - id
        - version_type
        - version_notes
      properties:
        id:
          type: string
          description: Project ID or IDNO
        version_type:
          type: string
          description: Type of version to create
          enum:
            - major
            - minor
            - patch
        version_notes:
          type: string
          description: Notes describing the version
      xml:
        name: CreateProjectVersion
    DeleteProjectVersion:
      type: object
      required:
        - id
        - version
      properties:
        id:
          type: string
          description: Project ID or IDNO for the main project
        version:
          type: string
          description: Version number to delete (e.g. 1.0.0)
      xml:
        name: DeleteProjectVersion
    DeleteProjectVersionById:
      type: object
      required:
        - id
        - version
      properties:
        id:
          type: string
          description: Project ID or IDNO for the version to delete
      xml:
        name: DeleteProjectVersionById
    PublishOptions:
      type: object
      description: >
        Fields merged into the exported project JSON before POST to NADA. Names and values
        follow the Metadata Editor publish UI and NADA dataset-create expectations. Any
        additional JSON properties are also merged if supplied.
      properties:
        overwrite:
          type: string
          enum:
            - "yes"
            - "no"
          default: "no"
          description: >
            If `yes`, allows replacing an existing study in the catalog with the same IDNO.
            Merged as top-level `overwrite` on the dataset JSON sent to NADA.
        published:
          type: integer
          format: int32
          enum:
            - 0
            - 1
          description: Catalog visibility — `0` draft, `1` published (merged as `published`).
        access_policy:
          type: string
          description: >
            Data access / access policy code merged as `access_policy` on the payload.
            Allowed values match the Metadata Editor publish form; NADA may validate against
            codes returned by `GET .../index.php/api/catalog/data_access_codes` on the catalog.
          enum:
            - data_na
            - direct
            - public
            - licensed
            - remote
            - enclave
            - open
            - ""
          default: data_na
        data_remote_url:
          type: string
          description: >
            URL for remote / external data access; merged as `data_remote_url`. Used when
            `access_policy` is `remote` or `enclave` (per catalog configuration).
        repositoryid:
          type: string
          description: >
            Target collection (repository) code in NADA; merged as `repositoryid`. Options
            are typically populated from `GET .../index.php/api/collections` on the catalog
            (see `/publish/catalog_info/...`).
      additionalProperties: true
      example:
        overwrite: "yes"
        published: 1
        access_policy: licensed
        data_remote_url: ""
        repositoryid: MY_COLLECTION
      xml:
        name: PublishOptions
    NadaCatalogInfoResponse:
      type: object
      description: Response from prefetching NADA data for the publish form
      properties:
        study_info:
          type: object
          description: >
            Outcome of `GET {catalog}/index.php/api/datasets/{study_idno}`. On success,
            normalized fields from `dataset` (without embedded `metadata`) plus `status:
            success`. On failure, includes `status` (`error` or `failed`), `error` message,
            optional `response`, and `api_url`.
        collections_codes:
          type: array
          description: Entries from NADA `GET .../index.php/api/collections` (`collections` array)
          items:
            type: object
            additionalProperties: true
        data_access_codes:
          type: array
          description: >
            Codes from NADA `GET .../index.php/api/catalog/data_access_codes` (`codes` array);
            used to populate the data access / access_policy control.
          items:
            type: object
            additionalProperties: true
        collections_linked:
          type: array
          description: >
            Collections already associated with the study from NADA
            `GET .../index.php/api/datasets/collections/{study_idno}` (normalized list).
          items:
            type: object
            additionalProperties: true
    DataStructureStatusCode:
      type: string
      description: >-
        Catalogue DSD lifecycle slug (persisted as an integer in `data_structures.status`):
        `draft`, `review`, `published` (locked from destructive edits), `deprecated`,
        `archived` (locked). Request bodies and import JSON must use these strings.
      enum: [draft, review, published, deprecated, archived]
    DataStructureReference:
      type: object
      description: >-
        Canonical link to a global catalogue DSD stored on project/study metadata.
        Matches `data_structure_reference` in `timeseries-schema.json`.
      required: [idno, agency, name, version]
      properties:
        idno:
          type: string
          description: Stable catalogue DSD idno
        agency:
          type: string
        name:
          type: string
          description: SDMX maintainable id
        version:
          type: string
        uri:
          type: string
          format: uri
          description: Optional URL for documentation or discovery; not used for import
        notes:
          type: string
          description: Optional free-text notes about this DSD link
      additionalProperties: false
    IndicatorDsdBindRequest:
      type: object
      description: Bind a global registry DSD to a project
      properties:
        data_structure_id:
          type: integer
          description: Numeric catalogue data structure id
        data_structure_reference:
          $ref: '#/components/schemas/DataStructureReference'
        indicator_id_value:
          type: string
          description: Value for the DSD indicator_id column used during data import
    ApiStatusFailed:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [failed]
        message:
          type: string
        error:
          type: string
          description: Present on some ACL denials (`Access denied`)
    CodelistStatusCode:
      type: string
