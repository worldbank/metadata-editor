  # ─────────────────────────────────────────────────────────────────────────
  # Jobs
  # ─────────────────────────────────────────────────────────────────────────

  "/jobs/import_indicator_data":
    post:
      tags:
        - Jobs
      summary: Import indicator data (full workflow)
      description: >
        Submit a single background job that handles the complete indicator data
        import workflow: loads the CSV into the draft buffer, validates columns
        against the DSD, and publishes rows for the requested `indicator_value`.


        The CSV must be uploaded first via `POST /uploads/*` to obtain an
        `upload_id`. Poll job status via `GET /jobs/{uuid}`.


        This is the recommended endpoint for API-based data ingestion. For
        step-by-step control (e.g. inspect the draft before publishing) use the
        individual `data_draft` / `data_import` endpoints instead.


        Requires edit access to the target project (same as the indicator DSD import APIs).
      operationId: importIndicatorDataJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - project_id
                - upload_id
                - indicator_value
              properties:
                project_id:
                  oneOf:
                    - type: integer
                      description: Numeric database project id
                    - type: string
                      description: Project idno, or numeric id as a string (same resolution as other editor APIs)
                  description: Indicator/timeseries project — numeric id or idno
                upload_id:
                  type: string
                  description: Completed upload session ID from POST /uploads/*
                indicator_value:
                  type: string
                  description: Value in the DSD indicator_id column; only matching rows are imported
                delimiter:
                  type: string
                  default: ","
                  description: CSV field delimiter character
                priority:
                  type: integer
                  default: 0
                  description: Job queue priority
      responses:
        "201":
          description: Import job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  uuid:
                    type: string
                    description: Job UUID — use with GET /jobs/{uuid} to poll status
                  job:
                    type: object
                    additionalProperties: true
      security:
        - ApiKeyAuth: []

