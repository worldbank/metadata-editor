      summary: Get NADA catalog info for publish form
      description: >
        Fetches data used to populate the publish UI: study record from the target NADA
        catalog (if the study IDNO exists), list of collections, allowed data-access
        codes, and collections already linked to the study. Calls the configured catalog
        base URL with the stored API key — e.g. `GET .../index.php/api/collections`,
        `GET .../index.php/api/catalog/data_access_codes`, `GET .../api/datasets/{idno}`,
        `GET .../api/datasets/collections/{idno}`.
      operationId: getNadaCatalogInfoForPublish
      parameters:
        - in: path
          name: sid
          description: Project ID (internal Metadata Editor project id)
          required: true
          schema:
            type: string
        - in: path
          name: catalog_connection_id
          description: Catalog connection ID (from list catalog connections)
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Catalog information for the publish form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NadaCatalogInfoResponse"
        "400":
          description: Bad request — user not logged in, missing parameters, or project not found
      security:
        - ApiKeyAuth: []
  "/publish/{sid}/{catalog_connection_id}":
    post:
      tags:
        - Publish projects
      summary: Publish project metadata
      description: >
        Publishes project metadata to a NADA catalog. The server loads the exported
        project JSON (generated for the project), then **merges** each property from the
        request body into that object as top-level keys. The combined JSON is sent to the
        catalog as `POST {catalog_url}/index.php/api/datasets/create/{type}` with header
        `x-api-key`, where `{type}` is derived from the project (e.g. `survey`, `timeseries`,
        `timeseries-db`). Typical merge fields from the Metadata Editor UI are
        `overwrite`, `published`, `access_policy`, `data_remote_url`, and `repositoryid`
        (see schema). Omit the body or send `{}` to publish without overriding those fields.
      operationId: publishProjectMetadata
      parameters:
        - in: path
          name: sid
          description: Project ID or IDNO
          required: true
          schema:
            type: string
        - in: path
          name: catalog_connection_id
          description: Catalog connection ID
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishOptions"
            examples:
              full:
                summary: Typical UI payload
                value:
                  overwrite: "yes"
                  published: 1
                  access_policy: licensed
                  data_remote_url: ""
                  repositoryid: MY_COLLECTION
        description: >
          NADA publish options merged into the project metadata JSON before POST to the
          catalog. All properties are optional; only supplied keys are merged.
      responses:
        "200":
          description: Project metadata published successfully (response shape follows NADA API)
        "400":
          description: Bad request - project not found, catalog connection not found, or
            publishing failed
      security:
        - ApiKeyAuth: []
  "/publish/thumbnail/{sid}/{catalog_connection_id}":
    post:
