      summary: Create resource
      description: >
        Create a new resource for a project. This endpoint accepts
        multipart/form-data to allow file uploads along with resource metadata.


        **File Upload**: If the 'file' parameter is provided, the file will be uploaded and attached to the resource.


        **Filename/URL**: The 'filename' parameter (string) can be used to specify either a filename or a URL. This is separate from the file upload.
      operationId: CreateResource
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                dctype:
                  description: Resource type
                  type: string
                title:
                  description: Resource title
                  type: string
                author:
                  type: string
                dcdate:
                  type: string
                country:
                  type: string
                language:
                  type: string
                contributor:
                  type: string
                publisher:
                  type: string
                rights:
                  type: string
                description:
                  type: string
                abstract:
                  type: string
                toc:
                  type: string
                file:
                  description: >
                    File to upload and attach to this resource. Send as
                    multipart/form-data with field name 'file'.

                    If provided, the file will be uploaded and associated with the resource. The file can be any type (PDF, document, image, etc.).
                  type: string
                  format: binary
                filename:
                  description: >
                    Filename or URL for the resource. This can be either a
                    filename string or a URL pointing to an external resource.

                    This is separate from the 'file' parameter - use 'file' to upload a file, or 'filename' to specify a filename/URL.
                  type: string
                overwrite:
                  description: >
                    When creating a resource, if another resource already uses the same
                    stored filename for this project, set to `true` to replace that row
                    instead of failing validation. Use `false` or omit to keep the
                    duplicate-filename error. With `multipart/form-data`, send the literal
                    strings `true` or `false` if your client cannot encode JSON booleans.
                  type: boolean
                  default: false
              required:
                - dctype
                - title
        required: true
